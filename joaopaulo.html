<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Fatia — Cardápio Digital</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0eb; font-family: 'Georgia', serif; color: #3d2b1f; min-height: 100vh; }
    .header { background: #fff8f3; padding: 24px 16px 16px; text-align: center; border-bottom: 2px solid #e8d5c4; }
    .header img.logo { width: 90px; height: 90px; object-fit: contain; border-radius: 50%; margin-bottom: 8px; }
    .header h1 { font-size: 1.5rem; color: #8b3a1a; letter-spacing: 1px; }
    .header .subtitle { font-size: 0.85rem; color: #b07050; margin-top: 4px; }
    .condominio-tag { display: inline-block; margin-top: 8px; background: #8b3a1a; color: #fff; font-size: 0.75rem; padding: 3px 12px; border-radius: 20px; letter-spacing: 0.5px; }
    .container { max-width: 480px; margin: 0 auto; padding: 16px; }
    .section-title { margin: 20px 0 10px; }
    .section-title h2 { font-size: 1rem; color: #8b3a1a; border-bottom: 1px solid #e8d5c4; padding-bottom: 6px; }
    .combo-section { margin: 24px 0 10px; background: linear-gradient(135deg, #fff8f0, #fdebd0); border-radius: 12px; padding: 12px 12px 4px; border: 2px solid #e8c49a; }
    .combo-section h2 { font-size: 1rem; color: #8b3a1a; margin-bottom: 8px; }
    .product-card { background: #fff; border-radius: 12px; margin-bottom: 12px; display: flex; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .combo-card { border: 2px solid #e8a87c; }
    .product-img { width: 100px; height: 100px; object-fit: cover; flex-shrink: 0; }
    .product-info { flex: 1; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; }
    .product-name { font-size: 0.9rem; font-weight: bold; color: #3d2b1f; margin-bottom: 2px; }
    .combo-desc { font-size: 0.75rem; color: #8b6050; margin: 2px 0 4px; font-style: italic; }
    .product-price { font-size: 1rem; color: #8b3a1a; font-weight: bold; }
    .badge-esgotado { display: none; background: #c0392b; color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
    .badge-lancamento { background: #e8a000; color: white; font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
    .estoque-aviso { font-size: 0.72rem; color: #e67e22; margin-top: 3px; min-height: 16px; }
    .qty-control { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .qty-btn { background: #8b3a1a; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-btn:disabled { background: #ccc; cursor: not-allowed; }
    .qty-display { font-size: 1rem; font-weight: bold; min-width: 20px; text-align: center; }
    .resumo { background: #fff8f3; border: 1px solid #e8d5c4; border-radius: 12px; padding: 14px; margin: 16px 0; font-size: 0.88rem; }
    .resumo-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .resumo-total { font-weight: bold; font-size: 1rem; border-top: 1px solid #e8d5c4; margin-top: 8px; padding-top: 8px; color: #8b3a1a; display: flex; justify-content: space-between; }
    .form-section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .form-section h3 { font-size: 1rem; color: #8b3a1a; margin-bottom: 12px; font-weight: bold; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 0.75rem; color: #8b6050; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid #e8d5c4; border-radius: 8px; font-size: 0.95rem; font-family: inherit; background: #fffaf7; color: #3d2b1f; outline: none; }
    .form-group input:focus { border-color: #8b3a1a; }
    .btn-enviar { width: 100%; background: #8b3a1a; color: white; border: none; border-radius: 12px; padding: 14px; font-size: 1rem; font-family: inherit; cursor: pointer; letter-spacing: 0.5px; margin-top: 4px; }
    .btn-enviar:disabled { background: #ccc; cursor: not-allowed; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #3d2b1f; color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none; white-space: nowrap; }
    .toast.show { opacity: 1; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff8f3; border-radius: 16px; padding: 24px; max-width: 320px; width: 90%; text-align: center; }
    .modal h2 { color: #8b3a1a; margin-bottom: 8px; }
    .modal p { font-size: 0.88rem; color: #5a3e35; margin-bottom: 16px; line-height: 1.5; white-space: pre-line; }
    .modal .pix-info { background: #fff; border: 1px solid #e8d5c4; border-radius: 8px; padding: 10px; margin-bottom: 16px; font-size: 0.85rem; }
    .modal-btn { background: #8b3a1a; color: white; border: none; border-radius: 10px; padding: 10px 24px; font-size: 0.95rem; cursor: pointer; margin: 4px; }
    .modal-btn.secondary { background: #e8d5c4; color: #3d2b1f; }
    .modal-esgotado { background: #fff3f0; }
    .modal-esgotado h2 { color: #c0392b; }
    .footer { text-align: center; padding: 24px 16px; font-size: 0.78rem; color: #b07050; }
  </style>
</head>
<body>
  <div class="header">
    <h1>La Fatia</h1>
    <div class="subtitle">Feito com carinho 🤍</div>
    <span class="condominio-tag">📍 João Paulo 3ª Etapa</span>
  </div>

  <div class="container" id="produto-container">
    <!-- Produtos renderizados via JS -->
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="modal-confirm">
    <div class="modal">
      <h2>Confirmar Pedido 🛒</h2>
      <p id="modal-resumo-texto"></p>
      <div class="pix-info">
        💳 <strong>PIX:</strong> 11975825140<br>
        <span style="font-size:0.8rem;color:#8b6050;">Samanta de Souza Sanches</span>
      </div>
      <p style="font-size:0.8rem;color:#8b6050;margin-bottom:12px;">Após o envio, realize o pagamento via PIX para confirmar seu pedido.</p>
      <button class="modal-btn" onclick="confirmarPedido()">Confirmar e Enviar ✅</button>
      <button class="modal-btn secondary" onclick="fecharModal('modal-confirm')">Voltar</button>
    </div>
  </div>

  <div class="modal-overlay" id="modal-esgotado">
    <div class="modal modal-esgotado">
      <h2>Que pena! 😔</h2>
      <p id="modal-esgotado-texto"></p>
      <button class="modal-btn" onclick="fecharModal('modal-esgotado')">Entendi</button>
    </div>
  </div>

  <script>
    const WEBHOOK_URL = "https://n8n-eogk.srv1598428.hstgr.cloud/webhook/lafatia";
    const ESTOQUE_URL = "https://n8n-eogk.srv1598428.hstgr.cloud/webhook/lafatia-estoque?cond=joao";

    // Índices:
    // 0 = Torta de Frango Cremoso
    // 1 = Torta de Calabresa com Requeijão
    // 2 = Torta de Palmito
    // 3 = Torta de Brócolis
    // 4 = Torta de Atum
    // 5 = Bolo de Cenoura com Brigadeiro  <-- componente do combo
    // 6 = Bolo de Chocolate com Brigadeiro
    // 7 = Bolo de Coco Gelado
    // 8 = Bolo de Fubá com Goiabada
    // 9 = Combo de Lançamento (1x Frango idx0 + 1x Cenoura idx5)

    const COMBO_IDX = 9;
    const COMBO_FRANGO_IDX = 0;
    const COMBO_CENOURA_IDX = 5;

    const produtos = [
      { id: 0, nome: "Torta de Frango Cremoso",              preco: 12.00, secao: "tortas",  img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Frango" },
      { id: 1, nome: "Torta de Calabresa com Requeijão Cremoso", preco: 12.00, secao: "tortas",  img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Calabresa" },
      { id: 2, nome: "Torta de Palmito",                     preco: 14.00, secao: "tortas",  img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Palmito" },
      { id: 3, nome: "Torta de Brócolis Cremoso",            preco: 12.00, secao: "tortas",  img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Brocolis" },
      { id: 4, nome: "Torta de Atum",                        preco: 14.00, secao: "tortas",  img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Atum" },
      { id: 5, nome: "Bolo de Cenoura com Brigadeiro",       preco: 10.00, secao: "bolos",   img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Cenoura" },
      { id: 6, nome: "Bolo de Chocolate com Brigadeiro",     preco: 10.00, secao: "bolos",   img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Chocolate" },
      { id: 7, nome: "Bolo de Coco Gelado",                  preco: 10.00, secao: "bolos",   img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Coco" },
      { id: 8, nome: "Bolo de Fubá com Goiabada",            preco:  8.00, secao: "bolos",   img: "https://via.placeholder.com/100x100/f5e6d3/8b3a1a?text=Fuba" },
      { id: 9, nome: "Combo de Lançamento",                  preco: 20.00, secao: "combo",
        desc: "1 Tortinha de Frango + 1 Bolo de Cenoura com Brigadeiro",
        img: "https://via.placeholder.com/100x100/fdebd0/8b3a1a?text=Combo" }
    ];

    const qtds = new Array(produtos.length).fill(0);
    const estoqueDisponivel = new Array(produtos.length).fill(true);
    const estoqueQtd = new Array(produtos.length).fill(999);

    // ─── RENDERIZAÇÃO ───────────────────────────────────────────────

    function renderizar() {
      const container = document.getElementById('produto-container');
      let html = '';

      // Combo no topo
      const combo = produtos[COMBO_IDX];
      html += `
        <div class="combo-section">
          <h2>⭐ Combo Especial</h2>
          ${renderCard(combo)}
        </div>`;

      // Tortas
      html += `<div class="section-title"><h2>🥧 Tortas</h2></div>`;
      produtos.filter(p => p.secao === 'tortas').forEach(p => { html += renderCard(p); });

      // Bolos
      html += `<div class="section-title"><h2>🎂 Bolos</h2></div>`;
      produtos.filter(p => p.secao === 'bolos').forEach(p => { html += renderCard(p); });

      // Resumo + Formulário
      html += `
        <div id="resumo-box" style="display:none;" class="resumo">
          <div id="resumo-itens"></div>
          <div class="resumo-total"><span>Total</span><span id="resumo-total-val"></span></div>
        </div>

        <div class="form-section">
          <h3>Seus dados para entrega</h3>
          <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="inp-nome" placeholder="Como devo te chamar?">
          </div>
          <div class="form-group">
            <label>Celular (WhatsApp)</label>
            <input type="tel" id="inp-celular" placeholder="(11) 99999-9999" maxlength="15">
          </div>
          <div class="form-group">
            <label>Apartamento / Bloco</label>
            <input type="text" id="inp-apto" placeholder="Ex: 42B ou Bloco 3, Ap 12">
          </div>
          <button class="btn-enviar" id="btn-enviar" onclick="enviarPedido()">Fazer Pedido 🛒</button>
        </div>

        <div class="footer">
          La Fatia — Feito com carinho 🤍<br>PIX: 11975825140
        </div>`;

      container.innerHTML = html;

      // Bind máscara celular
      document.getElementById('inp-celular').addEventListener('input', function () {
        let v = this.value.replace(/\D/g, '');
        if (v.length <= 10) v = v.replace(/(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
        else v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3');
        this.value = v.trim().replace(/-$/, '');
      });
    }

    function renderCard(p) {
      const isCombo = p.secao === 'combo';
      return `
        <div class="product-card${isCombo ? ' combo-card' : ''}">
          <img class="product-img" src="${p.img}" alt="${p.nome}" onerror="this.style.display='none'">
          <div class="product-info">
            <div>
              <div class="product-name">${p.nome}${isCombo ? ' <span class="badge-lancamento">LANÇAMENTO</span>' : ''}</div>
              ${p.desc ? `<div class="combo-desc">${p.desc}</div>` : ''}
              <div class="product-price">R$ ${p.preco.toFixed(2).replace('.', ',')}</div>
              <span class="badge-esgotado" id="badge-${p.id}">Esgotado</span>
              <p class="estoque-aviso" id="estoque-${p.id}"></p>
            </div>
            <div class="qty-control" id="qtycontrol-${p.id}">
              <button class="qty-btn" id="btn-minus-${p.id}" onclick="changeQty(${p.id}, -1)">−</button>
              <span class="qty-display" id="qty-${p.id}">0</span>
              <button class="qty-btn" id="btn-plus-${p.id}" onclick="changeQty(${p.id}, 1)">+</button>
            </div>
          </div>
        </div>`;
    }

    // ─── ESTOQUE ────────────────────────────────────────────────────

    async function carregarEstoque() {
      try {
        const res = await fetch(ESTOQUE_URL);
        const data = await res.json();
        const estoque = data[0]?.estoque || data?.estoque || [];

        estoque.forEach(item => {
          const idx = produtos.findIndex(p => p.nome === item.produto);
          if (idx === -1) return;

          const qtdDisp = Number(item.estoque);
          const disponivel = item.disponivel === true || item.disponivel === 'TRUE' || item.disponivel === 'true';

          estoqueDisponivel[idx] = disponivel && qtdDisp > 0;
          estoqueQtd[idx] = qtdDisp;

          const badge = document.getElementById('badge-' + idx);
          const aviso = document.getElementById('estoque-' + idx);
          const btnPlus = document.getElementById('btn-plus-' + idx);

          if (!estoqueDisponivel[idx]) {
            if (badge) badge.style.display = 'inline-block';
            if (btnPlus) btnPlus.disabled = true;
          } else if (qtdDisp <= 5) {
            if (aviso) aviso.textContent = 'Restam apenas ' + qtdDisp + '!';
          }
        });

        // Atualiza estado do botão + do combo com base nos componentes
        atualizarBotaoCombo();

      } catch (e) {
        console.log('Erro ao carregar estoque', e);
      }
    }

    // Calcula quantos combos ainda podem ser adicionados
    function maxComboDisponivel() {
      if (!estoqueDisponivel[COMBO_FRANGO_IDX] || !estoqueDisponivel[COMBO_CENOURA_IDX]) return 0;
      // Estoque líquido de cada componente (descontando unidades já selecionadas individualmente)
      const frangoLivre = estoqueQtd[COMBO_FRANGO_IDX] - qtds[COMBO_FRANGO_IDX];
      const cenouraLivre = estoqueQtd[COMBO_CENOURA_IDX] - qtds[COMBO_CENOURA_IDX];
      return Math.max(0, Math.min(frangoLivre, cenouraLivre));
    }

    function atualizarBotaoCombo() {
      const max = maxComboDisponivel();
      const badge = document.getElementById('badge-' + COMBO_IDX);
      const aviso = document.getElementById('estoque-' + COMBO_IDX);
      const btnPlus = document.getElementById('btn-plus-' + COMBO_IDX);

      if (max === 0 && qtds[COMBO_IDX] === 0) {
        if (badge) badge.style.display = 'inline-block';
        if (btnPlus) btnPlus.disabled = true;
      } else {
        if (badge) badge.style.display = 'none';
        if (btnPlus) btnPlus.disabled = (qtds[COMBO_IDX] >= max);
        if (aviso && max <= 3 && max > 0) aviso.textContent = 'Restam apenas ' + max + ' combos!';
        else if (aviso && max > 3) aviso.textContent = '';
      }
    }

    // ─── QUANTIDADE ─────────────────────────────────────────────────

    function changeQty(idx, delta) {
      const novo = qtds[idx] + delta;
      if (novo < 0) return;

      if (delta > 0) {
        if (!estoqueDisponivel[idx]) { showToast('Item esgotado!'); return; }

        if (idx === COMBO_IDX) {
          // Combo: verifica se há estoque dos componentes
          const max = maxComboDisponivel();
          if (novo > max) {
            showToast('Estoque insuficiente para o combo (Torta de Frango ou Bolo de Cenoura)');
            return;
          }
        } else {
          // Item individual: verifica estoque normal
          if (novo > estoqueQtd[idx]) {
            showToast('Quantidade máxima disponível: ' + estoqueQtd[idx]);
            return;
          }

          // Se for frango ou cenoura (componentes do combo), verifica se sobra pra combos já selecionados
          if (idx === COMBO_FRANGO_IDX || idx === COMBO_CENOURA_IDX) {
            const outroIdx = idx === COMBO_FRANGO_IDX ? COMBO_CENOURA_IDX : COMBO_FRANGO_IDX;
            // Estoque necessário para combos já no carrinho
            const reservadoPorCombo = qtds[COMBO_IDX];
            // Estoque disponível do componente atual após seleção
            const dispAposSelecao = estoqueQtd[idx] - novo;
            if (dispAposSelecao < reservadoPorCombo) {
              showToast('Não é possível adicionar: reduz o estoque disponível para o combo já no carrinho');
              return;
            }
          }
        }
      }

      qtds[idx] = novo;
      document.getElementById('qty-' + idx).textContent = novo;

      // Botão − desabilitado quando qty = 0
      const btnMinus = document.getElementById('btn-minus-' + idx);
      if (btnMinus) btnMinus.disabled = (novo === 0);

      // Botão + desabilitado quando qty = estoqueQtd (para itens normais)
      if (idx !== COMBO_IDX) {
        const btnPlus = document.getElementById('btn-plus-' + idx);
        if (btnPlus) btnPlus.disabled = !estoqueDisponivel[idx] || (novo >= estoqueQtd[idx]);
      }

      // Reavalia botão + do combo (componentes podem ter mudado)
      atualizarBotaoCombo();

      // Se um componente foi removido mas não há mais estoque pra manter combos, reduz combo
      if ((idx === COMBO_FRANGO_IDX || idx === COMBO_CENOURA_IDX) && delta < 0) {
        const max = maxComboDisponivel();
        if (qtds[COMBO_IDX] > max) {
          qtds[COMBO_IDX] = max;
          document.getElementById('qty-' + COMBO_IDX).textContent = max;
        }
      }

      atualizarResumo();
    }

    // ─── RESUMO ─────────────────────────────────────────────────────

    function atualizarResumo() {
      const box = document.getElementById('resumo-box');
      const itensDiv = document.getElementById('resumo-itens');
      const totalEl = document.getElementById('resumo-total-val');

      const itens = produtos.map((p, i) => ({ ...p, qtd: qtds[i] })).filter(p => p.qtd > 0);

      if (itens.length === 0) { box.style.display = 'none'; return; }

      box.style.display = 'block';
      itensDiv.innerHTML = itens.map(p =>
        `<div class="resumo-item"><span>${p.qtd}x ${p.nome}</span><span>R$ ${(p.qtd * p.preco).toFixed(2).replace('.', ',')}</span></div>`
      ).join('');
      const total = itens.reduce((s, p) => s + p.qtd * p.preco, 0);
      totalEl.textContent = 'R$ ' + total.toFixed(2).replace('.', ',');
    }

    // ─── ENVIO ──────────────────────────────────────────────────────

    async function enviarPedido() {
      const nome = document.getElementById('inp-nome').value.trim();
      const celular = document.getElementById('inp-celular').value.trim();
      const apto = document.getElementById('inp-apto').value.trim();

      const itensCarrinho = produtos.map((p, i) => ({ ...p, quantidade: qtds[i] })).filter(p => p.quantidade > 0);

      if (!nome) { showToast('Informe seu nome'); return; }
      if (celular.length < 14) { showToast('Informe um celular válido'); return; }
      if (!apto) { showToast('Informe seu apartamento'); return; }
      if (itensCarrinho.length === 0) { showToast('Selecione ao menos um item'); return; }

      // Verifica estoque em tempo real antes de confirmar
      try {
        const res = await fetch(ESTOQUE_URL);
        const data = await res.json();
        const estoqueAtual = data[0]?.estoque || data?.estoque || [];
        const esgotados = [];

        // Monta mapa de estoque em tempo real
        const estoqueMap = {};
        estoqueAtual.forEach(item => { estoqueMap[item.produto] = { qtd: Number(item.estoque), disp: item.disponivel === true || item.disponivel === 'TRUE' || item.disponivel === 'true' }; });

        // Para validação, transforma combo em consumo dos componentes
        const consumo = {}; // nome -> qtd necessária
        itensCarrinho.forEach(item => {
          if (item.id === COMBO_IDX) {
            // Combo consome frango + cenoura
            const frango = produtos[COMBO_FRANGO_IDX].nome;
            const cenoura = produtos[COMBO_CENOURA_IDX].nome;
            consumo[frango] = (consumo[frango] || 0) + item.quantidade;
            consumo[cenoura] = (consumo[cenoura] || 0) + item.quantidade;
          } else {
            consumo[item.nome] = (consumo[item.nome] || 0) + item.quantidade;
          }
        });

        // Verifica se o estoque comporta o consumo total
        Object.entries(consumo).forEach(([nomeProd, qtdNecessaria]) => {
          const est = estoqueMap[nomeProd];
          if (!est || !est.disp || est.qtd < qtdNecessaria) {
            esgotados.push(nomeProd + (est ? ` (disponível: ${est.qtd})` : ' (indisponível)'));
          }
        });

        if (esgotados.length > 0) {
          document.getElementById('modal-esgotado-texto').textContent =
            'Itens indisponíveis ou sem estoque suficiente:\n\n' + esgotados.join('\n') +
            '\n\nAjuste seu pedido e tente novamente.';
          document.getElementById('modal-esgotado').classList.add('show');
          return;
        }
      } catch (e) {
        console.log('Erro ao validar estoque em tempo real', e);
      }

      // Monta texto do resumo para o modal
      const total = itensCarrinho.reduce((s, p) => s + p.quantidade * p.preco, 0);
      const resumoTexto = itensCarrinho.map(p =>
        `${p.quantidade}x ${p.nome} — R$ ${(p.quantidade * p.preco).toFixed(2).replace('.', ',')}`
      ).join('\n') + `\n\nTotal: R$ ${total.toFixed(2).replace('.', ',')}`;

      document.getElementById('modal-resumo-texto').textContent = resumoTexto;
      document.getElementById('modal-confirm').classList.add('show');
    }

    async function confirmarPedido() {
      fecharModal('modal-confirm');
      const btn = document.getElementById('btn-enviar');
      btn.disabled = true;
      btn.textContent = 'Enviando...';

      const nome = document.getElementById('inp-nome').value.trim();
      const celular = document.getElementById('inp-celular').value.replace(/\D/g, '');
      const apto = document.getElementById('inp-apto').value.trim();
      const data = new Date().toLocaleString('pt-BR');

      // ──────────────────────────────────────────────────────────────
      // EXPANSÃO DO COMBO:
      // O n8n desconta estoque pelo nome do produto.
      // "Combo de Lançamento" NÃO existe na planilha, então precisamos
      // expandir o combo em seus componentes antes de enviar.
      // Itens individuais e componentes do combo são SOMADOS.
      // ──────────────────────────────────────────────────────────────
      const qtdsExpandidas = [...qtds]; // cópia
      const qtdCombo = qtds[COMBO_IDX];

      // Soma as unidades do combo nos componentes
      qtdsExpandidas[COMBO_FRANGO_IDX] = qtds[COMBO_FRANGO_IDX] + qtdCombo;
      qtdsExpandidas[COMBO_CENOURA_IDX] = qtds[COMBO_CENOURA_IDX] + qtdCombo;
      qtdsExpandidas[COMBO_IDX] = 0; // combo em si não vai para o n8n como item

      // Monta array de itens para o webhook (sem o combo, com componentes expandidos)
      const itensWebhook = [];

      // Itens individuais expandidos (excluindo combo)
      produtos.forEach((p, i) => {
        if (i === COMBO_IDX) return; // pula o combo
        if (qtdsExpandidas[i] > 0) {
          itensWebhook.push({
            nome: p.nome,
            preco: p.preco,
            quantidade: qtdsExpandidas[i],
            subtotal: parseFloat((qtdsExpandidas[i] * p.preco).toFixed(2))
          });
        }
      });

      // Calcula total real (usando qtds originais do carrinho, incluindo preço do combo)
      const total = produtos.reduce((s, p, i) => s + qtds[i] * p.preco, 0);

      // Para o resumo visual na mensagem Whatsapp, manda os itens como o usuário selecionou
      // (incluindo "Combo de Lançamento" como linha) — o campo itens do pedido usa itensWebhook
      // mas a mensagem formatada usa os itens originais
      const itensOriginais = produtos
        .map((p, i) => ({ nome: p.nome, preco: p.preco, quantidade: qtds[i], subtotal: parseFloat((qtds[i] * p.preco).toFixed(2)) }))
        .filter(p => p.quantidade > 0);

      // Envia para o n8n: itens = expandidos (para baixa de estoque correta)
      // mas mantém itensOriginais para o resumo da mensagem ao cliente
      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            nome,
            celular,
            apto,
            // itens expandidos (sem combo, com componentes somados) — usados para baixa de estoque
            itens: itensWebhook,
            // itens originais do carrinho para a mensagem ao cliente
            itensOriginais,
            total: parseFloat(total.toFixed(2)),
            data,
            condominio: 'João Paulo 3ª Etapa'
          })
        });

        showToast('Pedido enviado! ✅');

        // Limpa carrinho
        qtds.fill(0);
        produtos.forEach(p => {
          const el = document.getElementById('qty-' + p.id);
          if (el) el.textContent = '0';
        });
        document.getElementById('inp-nome').value = '';
        document.getElementById('inp-celular').value = '';
        document.getElementById('inp-apto').value = '';
        atualizarResumo();
        atualizarBotaoCombo();

      } catch (e) {
        showToast('Erro ao enviar. Tente novamente.');
      }

      btn.disabled = false;
      btn.textContent = 'Fazer Pedido 🛒';
    }

    // ─── UTILITÁRIOS ────────────────────────────────────────────────

    function fecharModal(id) { document.getElementById(id).classList.remove('show'); }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ─── INIT ───────────────────────────────────────────────────────

    renderizar();
    carregarEstoque();

  </script>
</body>
